<!DOCTYPE html>
<html>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px;">
    <img src="https://via.placeholder.com/100" alt="Logo" style="margin-bottom: 20px;">
    <h2>Member Login</h2>
    <div style="margin: 10px;">
        <label>User ID:</label><br>
        <input type="text" id="u" style="padding: 8px;">
    </div>
    <div style="margin: 10px;">
        <label>Password:</label><br>
        <input type="password" id="p" style="padding: 8px;">
    </div>
    <br>
    <button onclick="alert('Access Granted')" style="padding: 10px 20px;">Submit</button>
    <button onclick="document.getElementById('u').value=''; document.getElementById('p').value='';" style="padding: 10px 20px;">Reset</button>
</body>
</html>
